services:
  dashboard:
    build: .
    environment:
      - COMREX_API_TOKEN=${COMREX_API_TOKEN}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - dashboard
